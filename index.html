<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bexboy - official</title>

<link rel="icon" href="https://raw.githubusercontent.com/Bexboy/app/main/MIT%20BEX%20BOY%202%20.png.png">

<style>
:root{
  --text:#ecfdf5;
  --accent:#22c55e;
}

html{ scroll-behavior:smooth; }

body{
  margin:0;
  font-family: Arial, sans-serif;
  color:var(--text);
  overflow-x:hidden;
}

/* 🌌 CANVAS BACKGROUND */
#bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
}

/* 📊 PROGRESS BAR */
.progress{
  position:fixed;
  top:0;
  left:0;
  height:4px;
  background:#22c55e;
  width:0%;
  z-index:999;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  align-items:center;
}

nav h2{
  display:flex;
  align-items:center;
  gap:10px;
  margin:0;
}

nav h2 img{
  width:32px;
  height:32px;
  border-radius:8px;
  transition:0.3s;
}

nav h2 img:hover{
  transform:scale(1.2) rotate(5deg);
}

nav a{
  color:#d1fae5;
  margin-left:20px;
  text-decoration:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

.hero h1{
  font-size:3.5rem;
}

.hero p{
  color:#bbf7d0;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:30px;
  padding:15px 35px;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:#022c22;
  border-radius:12px;
  font-weight:bold;
  text-decoration:none;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

/* CARDS */
.card{
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  margin:10px;
  width:250px;
  display:inline-block;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
}

/* SCREENSHOTS */
.screenshots img{
  width:220px;
  border-radius:15px;
  margin:10px;
  transition:0.3s;
}

.screenshots img:hover{
  transform:scale(1.08);
}

/* ✨ REVEAL */
.reveal{
  opacity:0;
  transform:translateY(60px);
}

.reveal.active{
  opacity:1;
  transform:translateY(0);
  transition:0.8s;
}

/* 🧠 CURSOR GLOW */
.cursor{
  position:fixed;
  width:200px;
  height:200px;
  background:radial-gradient(circle, rgba(34,197,94,0.15), transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  filter:blur(30px);
  z-index:999;
}

footer{
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="progress"></div>
<div class="cursor"></div>

<!-- NAV -->
<nav>
  <h2>
    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1" target="_blank" style="display:flex;align-items:center;gap:10px;color:white;text-decoration:none;">
      <img src="https://raw.githubusercontent.com/Bexboy/app/main/MIT%20BEX%20BOY%202%20.png.png">
      Bexboy
    </a>
  </h2>
  <div>
    <a href="#features">Features</a>
    <a href="https://github.com/Bexboy" target="_blank">GitHub</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1 class="reveal">Download Bexboy Instantly</h1>
  <p class="reveal">Fast, simple, and powerful.</p>
  <a class="btn reveal" href="https://raw.githubusercontent.com/Bexboy/app/main/bexboy version 2.0.2.apk">Download Now</a>
</section>

<!-- FEATURES -->
<section id="features" class="section reveal">
  <h2>Features</h2>
  <div>
    <div class="card reveal">⚡ Fast</div>
    <div class="card reveal">🎯 Simple</div>
    <div class="card reveal">🔒 Secure</div>
  </div>
</section>

<!-- SCREENSHOTS -->
<section class="section reveal">
  <h2>📱 Screenshots</h2>
  <div class="screenshots">
    <img class="reveal" src="https://raw.githubusercontent.com/Bexboy/app/main/WhatsApp Image 2026-03-31 at 9.29.53 PM.jpeg">
    <img class="reveal" src="https://raw.githubusercontent.com/Bexboy/app/main/the whay pn.jpeg">
  </div>
</section>

<footer>© 2026 Bexboy</footer>

<script>

/* ✨ REVEAL */
const observer=new IntersectionObserver(entries=>{
  entries.forEach((entry,i)=>{
    if(entry.isIntersecting){
      setTimeout(()=>entry.target.classList.add('active'), i*120);
    }
  });
});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

/* 📊 PROGRESS */
window.addEventListener('scroll',()=>{
  let s=window.scrollY;
  let h=document.body.scrollHeight-window.innerHeight;
  document.querySelector('.progress').style.width=(s/h)*100+"%";
});

/* 🧠 CURSOR */
const cursor=document.querySelector('.cursor');
document.addEventListener('mousemove',e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
});

/* 🌌 PARTICLE BACKGROUND */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2+1,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5
  });
}

function animate(){
  ctx.fillStyle="#052e16";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#22c55e";

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});

</script>

</body>
</html>
